<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>戈21 A+</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a56db;
      --primary-light: #e8f0fe;
      --income: #0e9f6e;
      --income-light: #def7ec;
      --expense: #e02424;
      --expense-light: #fde8e8;
      --balance: #7e3af2;
      --balance-light: #edebfe;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --bg: #f3f4f6;
      --card: #ffffff;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.06);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }

    /* ══ LOGIN ══ */
    #login-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a56db 0%, #7e3af2 100%);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    #login-overlay.hidden { display: none; }
    .login-box {
      background: #fff; border-radius: 16px; padding: 40px 36px;
      width: 100%; max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25); text-align: center;
    }
    .login-logo { font-size: 44px; margin-bottom: 8px; }
    .login-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 12px 16px; border: 2px solid var(--border);
      border-radius: 8px; font-size: 16px; text-align: center;
      letter-spacing: 4px; margin-bottom: 10px;
      transition: border-color .15s, box-shadow .15s;
    }
    .login-box input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,86,219,.15); }
    .login-box input.shake { animation: shake .4s ease; border-color: var(--expense) !important; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
    }
    .login-error { font-size: 13px; color: var(--expense); min-height: 20px; margin-bottom: 8px; }
    .login-btn {
      width: 100%; padding: 12px; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    .login-btn:hover { opacity: .88; }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ══ MODAL BASE ══ */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: flex; align-items: flex-end; justify-content: center; z-index: 8000;
    }
    .modal-overlay.hidden { display: none; }
    .modal-sheet {
      background: #fff; border-radius: 20px 20px 0 0; padding: 24px 24px 32px;
      width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } }
    .modal-drag { width: 40px; height: 4px; background: #d1d5db; border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .modal-msg { font-size: 13px; min-height: 18px; margin-bottom: 10px; }
    .modal-msg.error   { color: var(--expense); }
    .modal-msg.success { color: var(--income); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .modal-hint { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.5; }
    .modal-hint a { color: var(--primary); }

    /* ══ APP SHELL ══ */
    #app { display: none; }
    #app.visible { display: block; }

    header {
      background: var(--primary); color: #fff;
      padding: 0 12px; display: flex; align-items: center; gap: 8px; height: 52px;
      box-shadow: 0 2px 4px rgba(0,0,0,.15);
    }
    header h1 { font-size: 15px; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hbtn {
      background: rgba(255,255,255,.18); color: #fff;
      border: 1px solid rgba(255,255,255,.3); border-radius: 6px;
      padding: 5px 8px; font-size: 12px; cursor: pointer;
      white-space: nowrap; transition: background .15s;
    }
    .hbtn:hover { background: rgba(255,255,255,.28); }

    /* ══ SUMMARY ══ */
    .summary-bar {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 12px; padding: 16px; max-width: 700px; margin: 0 auto;
    }
    .sum-card {
      background: var(--card); border-radius: var(--radius);
      padding: 14px 16px; box-shadow: var(--shadow); text-align: center;
    }
    .sum-card.income  { border-top: 3px solid var(--income); }
    .sum-card.expense { border-top: 3px solid var(--expense); }
    .sum-card.balance { border-top: 3px solid var(--balance); }
    .sum-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .sum-value { font-size: 20px; font-weight: 700; }
    .sum-card.income  .sum-value { color: var(--income); }
    .sum-card.expense .sum-value { color: var(--expense); }
    .sum-card.balance .sum-value { color: var(--balance); }

    /* ══ RECORD BUTTON ══ */
    .record-btn-wrap { text-align: center; padding: 0 16px 16px; }
    .record-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 50px; padding: 13px 36px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 14px rgba(26,86,219,.4);
      transition: opacity .15s, transform .15s;
    }
    .record-btn:hover { opacity: .9; transform: translateY(-1px); }
    .record-btn:active { transform: translateY(0); }

    /* ══ LIST AREA ══ */
    .list-wrap { max-width: 700px; margin: 0 auto; padding: 0 16px 80px; }

    .filter-bar {
      background: var(--card); border-radius: var(--radius);
      padding: 12px 16px; margin-bottom: 12px;
      box-shadow: var(--shadow);
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    .seg-tabs { display: flex; background: var(--bg); border-radius: 8px; padding: 3px; gap: 2px; }
    .seg-btn {
      padding: 6px 16px; border: none; background: none; border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer; color: var(--muted);
      transition: background .15s, color .15s;
    }
    .seg-btn.active { background: #fff; color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.12); }
    .search-input {
      flex: 1; min-width: 120px; padding: 7px 12px;
      border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
    }
    .type-filter { width: 120px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
    .dl-btn {
      padding: 7px 14px; background: var(--income); color: #fff;
      border: none; border-radius: 6px; font-size: 13px; cursor: pointer;
      white-space: nowrap; transition: opacity .15s;
    }
    .dl-btn:hover { opacity: .85; }

    /* ══ TRANSACTION LIST ══ */
    .tx-list { display: flex; flex-direction: column; gap: 8px; }
    .tx-item {
      background: var(--card); border-radius: var(--radius);
      padding: 14px 16px; box-shadow: var(--shadow);
      display: grid; grid-template-columns: auto 1fr auto auto;
      align-items: center; gap: 12px;
    }
    .tx-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .tx-dot.income  { background: var(--income); }
    .tx-dot.expense { background: var(--expense); }
    .tx-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .tx-person { font-size: 15px; font-weight: 600; }
    .tx-badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
    .tx-badge.income  { background: var(--income-light);  color: var(--income); }
    .tx-badge.expense { background: var(--expense-light); color: var(--expense); }
    .tx-bottom { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .tx-amount { font-size: 18px; font-weight: 700; white-space: nowrap; }
    .tx-amount.income  { color: var(--income); }
    .tx-amount.expense { color: var(--expense); }
    .tx-actions { display: flex; flex-direction: column; gap: 4px; }
    .tx-edit-btn {
      padding: 4px 10px; font-size: 12px; border: 1px solid var(--border);
      border-radius: 5px; cursor: pointer; background: #fff; color: var(--primary);
    }
    .tx-edit-btn:hover { background: var(--primary-light); }
    .tx-del-btn {
      padding: 4px 10px; font-size: 12px; border: none;
      border-radius: 5px; cursor: pointer; background: var(--expense-light); color: var(--expense);
    }
    .tx-del-btn:hover { background: #fca5a5; }
    .tx-empty { text-align: center; padding: 48px 0; color: var(--muted); font-size: 15px; }
    .tx-summary {
      text-align: center; padding: 12px; font-size: 13px; color: var(--muted);
      background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-top: 8px;
    }

    /* ══ FORM in modal ══ */
    .dir-toggle { display: flex; gap: 0; margin-bottom: 20px; border-radius: 10px; overflow: hidden; border: 2px solid var(--border); }
    .dir-btn {
      flex: 1; padding: 11px; border: none; background: none; cursor: pointer;
      font-size: 15px; font-weight: 600; transition: background .15s, color .15s;
    }
    .dir-btn.income.active  { background: var(--income);  color: #fff; }
    .dir-btn.expense.active { background: var(--expense); color: #fff; }
    .dir-btn:not(.active) { color: var(--muted); }

    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 5px; }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 15px; color: var(--text); background: #fff;
      transition: border-color .15s, box-shadow .15s; font-family: inherit;
    }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
      outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,86,219,.12);
    }
    .form-row textarea { resize: vertical; min-height: 70px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }

    .btn { padding: 10px 22px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary  { background: var(--primary); color: #fff; flex: 1; padding: 12px; font-size: 15px; }
    .btn-cancel   { background: var(--bg); color: var(--text); }

    /* pwd/api modals centered */
    .modal-overlay.center { align-items: center; }
    .modal-box {
      background: #fff; border-radius: 12px; padding: 28px;
      width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .modal-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
    .modal-box .form-row { margin-bottom: 12px; }
    .modal-box .form-row input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
    .modal-box .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .modal-box .btn-sm { padding: 8px 18px; font-size: 14px; }

    @media (max-width: 480px) {
      .summary-bar { gap: 8px; padding: 12px; }
      .sum-value { font-size: 16px; }
      .tx-item { grid-template-columns: auto 1fr auto auto; gap: 8px; }
      .tx-amount { font-size: 15px; }
      header h1 { font-size: 13px; }
    }
  </style>
</head>
<body>

<div id="app">

<script>
'use strict';

// ═══════════════════════════════════════
// PASSWORD
// ═══════════════════════════════════════
const PWD_KEY = 'ge21_pwd_hash', SES_KEY = 'ge21_authed';

async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function initPwd() {
  if (!localStorage.getItem(PWD_KEY))
    localStorage.setItem(PWD_KEY, await sha256('20260601'));
}
async function verifyPwd(s) { return (await sha256(s)) === localStorage.getItem(PWD_KEY); }

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const inp = document.getElementById('login-pwd');
  const err = document.getElementById('login-error');
  btn.disabled = true;
  if (await verifyPwd(inp.value)) {
    sessionStorage.setItem(SES_KEY, '1');
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    appInit();
  } else {
    err.textContent = '密码错误，请重试';
    inp.value = '';
    inp.classList.add('shake');
    inp.addEventListener('animationend', () => inp.classList.remove('shake'), { once: true });
  }
  btn.disabled = false;
}
document.getElementById('login-pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  sessionStorage.removeItem(SES_KEY);
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-overlay').classList.remove('hidden');
  document.getElementById('login-pwd').value = '';
  document.getElementById('login-error').textContent = '';
}

function openPwd() {
  ['pwd-old','pwd-new','pwd-confirm'].forEach(id => document.getElementById(id).value = '');
  setMsg('pwd-msg','','');
  document.getElementById('pwd-modal').classList.remove('hidden');
}
async function changePassword() {
  const o = document.getElementById('pwd-old').value;
  const n = document.getElementById('pwd-new').value;
  const c = document.getElementById('pwd-confirm').value;
  if (!await verifyPwd(o)) return setMsg('pwd-msg','当前密码错误','error');
  if (n.length < 6)        return setMsg('pwd-msg','新密码至少 6 位','error');
  if (n !== c)             return setMsg('pwd-msg','两次密码不一致','error');
  localStorage.setItem(PWD_KEY, await sha256(n));
  setMsg('pwd-msg','密码修改成功！','success');
  setTimeout(() => document.getElementById('pwd-modal').classList.add('hidden'), 1100);
}

function setMsg(id, text, cls) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'modal-msg' + (cls ? ' ' + cls : '');
}

// ═══════════════════════════════════════
// FUND DATA
// ═══════════════════════════════════════
const DB_KEY = 'ge21_records';
function loadAll() { return JSON.parse(localStorage.getItem(DB_KEY) || '[]'); }
function saveAll(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); }

const TYPE_OPTS = {
  income:  ['捐款','缴费','报名费','其他'],
  expense: ['物料','活动','报名费','其他']
};

// ═══════════════════════════════════════
// FUND ENTRY MODAL
// ═══════════════════════════════════════
let currentDir = 'income';

function openEntry(dir) {
  currentDir = dir || 'income';
  setDir(currentDir);
  clearEntryForm();
  document.getElementById('entry-modal').classList.remove('hidden');
  document.getElementById('entry-modal-title').textContent = '记一笔';
}
function closeEntry() {
  document.getElementById('entry-modal').classList.add('hidden');
}

function setDir(dir) {
  currentDir = dir;
  document.getElementById('dir-income').classList.toggle('active', dir === 'income');
  document.getElementById('dir-expense').classList.toggle('active', dir === 'expense');
  const sel = document.getElementById('f-type');
  sel.innerHTML = TYPE_OPTS[dir].map(o => `<option value="${o}">${o}</option>`).join('');
  document.getElementById('type-label').textContent = dir === 'income' ? '收入类型' : '支出类型';
  document.getElementById('person-label').textContent = dir === 'income' ? '付款人 *' : '付款对象 *';
}

function clearEntryForm() {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('f-date').value   = today;
  document.getElementById('f-amount').value = '';
  document.getElementById('f-person').value = '';
  document.getElementById('f-remark').value = '';
  setDir(currentDir);
}

function saveRecord() {
  const date   = document.getElementById('f-date').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  const type   = document.getElementById('f-type').value;
  const person = document.getElementById('f-person').value.trim();
  const remark = document.getElementById('f-remark').value.trim();

  if (!date)                         return alert('请填写日期');
  if (isNaN(amount) || amount <= 0)  return alert('请填写正确金额');
  if (!person)                       return alert('请填写' + (currentDir === 'income' ? '付款人' : '付款对象'));

  const data = loadAll();
  data.push({ id: Date.now(), dir: currentDir, date, type, person, amount, remark });
  data.sort((a, b) => b.date.localeCompare(a.date));
  saveAll(data);
  closeEntry();
  renderList();
  updateSummary();
}

// ═══════════════════════════════════════
// FUND EDIT MODAL
// ═══════════════════════════════════════
function openEdit(id) {
  const rec = loadAll().find(r => r.id === id);
  if (!rec) return;
  document.getElementById('edit-id').value     = id;
  document.getElementById('edit-dir').value    = rec.dir;
  document.getElementById('e-date').value      = rec.date;
  document.getElementById('e-amount').value    = rec.amount;
  document.getElementById('e-person').value    = rec.person;
  document.getElementById('e-remark').value    = rec.remark;
  document.getElementById('e-type-label').textContent = rec.dir === 'income' ? '收入类型' : '支出类型';
  document.getElementById('e-person-label').textContent = rec.dir === 'income' ? '付款人 *' : '付款对象 *';
  const sel = document.getElementById('e-type');
  sel.innerHTML = TYPE_OPTS[rec.dir].map(o => `<option value="${o}"${o===rec.type?' selected':''}>${o}</option>`).join('');
  document.getElementById('edit-modal').classList.remove('hidden');
}
function closeEdit() { document.getElementById('edit-modal').classList.add('hidden'); }

function saveEdit() {
  const id     = parseInt(document.getElementById('edit-id').value);
  const date   = document.getElementById('e-date').value.trim();
  const amount = parseFloat(document.getElementById('e-amount').value);
  const type   = document.getElementById('e-type').value;
  const person = document.getElementById('e-person').value.trim();
  const remark = document.getElementById('e-remark').value.trim();

  if (!date)                        return alert('请填写日期');
  if (isNaN(amount) || amount <= 0) return alert('请填写正确金额');
  if (!person)                      return alert('请填写' + (document.getElementById('edit-dir').value === 'income' ? '付款人' : '付款对象'));

  const data = loadAll();
  const rec  = data.find(r => r.id === id);
  if (rec) { rec.date = date; rec.amount = amount; rec.type = type; rec.person = person; rec.remark = remark; }
  data.sort((a, b) => b.date.localeCompare(a.date));
  saveAll(data);
  closeEdit();
  renderList();
  updateSummary();
}

function deleteRecord(id) {
  if (!confirm('确定删除该记录？')) return;
  saveAll(loadAll().filter(r => r.id !== id));
  renderList();
  updateSummary();
}

// ═══════════════════════════════════════
// FUND RENDER LIST
// ═══════════════════════════════════════
let currentSeg = 'all';

function setSeg(seg) {
  currentSeg = seg;
  document.querySelectorAll('.seg-btn[data-seg]').forEach(b => b.classList.toggle('active', b.dataset.seg === seg));
  updateTypeFilter();
  renderList();
}

function updateTypeFilter() {
  const sel = document.getElementById('type-filter');
  const prev = sel.value;
  let opts = ['<option value="">全部类型</option>'];
  if (currentSeg !== 'expense') TYPE_OPTS.income.forEach(o  => opts.push(`<option value="${o}">${o}（收）</option>`));
  if (currentSeg !== 'income')  TYPE_OPTS.expense.forEach(o => opts.push(`<option value="${o}">${o}（支）</option>`));
  sel.innerHTML = opts.join('');
  sel.value = prev;
}

function renderList() {
  const search = document.getElementById('search').value.toLowerCase();
  const typeF  = document.getElementById('type-filter').value;

  const rows = loadAll().filter(r => {
    if (currentSeg !== 'all' && r.dir !== currentSeg) return false;
    if (typeF && r.type !== typeF) return false;
    if (search && !r.person.toLowerCase().includes(search) && !r.remark.toLowerCase().includes(search)) return false;
    return true;
  });

  const container = document.getElementById('tx-list');

  if (rows.length === 0) {
    container.innerHTML = `<div class="tx-empty">暂无记录</div>`;
    return;
  }

  const filtInc = rows.filter(r => r.dir === 'income').reduce((s,r) => s+r.amount, 0);
  const filtExp = rows.filter(r => r.dir === 'expense').reduce((s,r) => s+r.amount, 0);

  container.innerHTML = rows.map(r => `
    <div class="tx-item">
      <div class="tx-dot ${r.dir}"></div>
      <div class="tx-main">
        <div class="tx-top">
          <span class="tx-person">${esc(r.person)}</span>
          <span class="tx-badge ${r.dir}">${r.type}</span>
        </div>
        <div class="tx-bottom">${r.date}${r.remark ? ' · ' + esc(r.remark) : ''}</div>
      </div>
      <div class="tx-amount ${r.dir}">${r.dir === 'income' ? '+' : '-'}¥${r.amount.toFixed(2)}</div>
      <div class="tx-actions">
        <button class="tx-edit-btn" onclick="openEdit(${r.id})">编辑</button>
        <button class="tx-del-btn"  onclick="deleteRecord(${r.id})">删除</button>
      </div>
    </div>
  `).join('') + `
    <div class="tx-summary">
      共 ${rows.length} 笔 &nbsp;|&nbsp;
      收入 <span style="color:var(--income);font-weight:600">+¥${filtInc.toFixed(2)}</span> &nbsp;
      支出 <span style="color:var(--expense);font-weight:600">-¥${filtExp.toFixed(2)}</span> &nbsp;
      净额 <span style="color:var(--balance);font-weight:600">¥${(filtInc-filtExp).toFixed(2)}</span>
    </div>`;
}

// ═══════════════════════════════════════
// FUND SUMMARY
// ═══════════════════════════════════════
function updateSummary() {
  const all = loadAll();
  const inc = all.filter(r => r.dir === 'income').reduce((s,r) => s+r.amount, 0);
  const exp = all.filter(r => r.dir === 'expense').reduce((s,r) => s+r.amount, 0);
  document.getElementById('s-income').textContent  = '¥' + inc.toFixed(2);
  document.getElementById('s-expense').textContent = '¥' + exp.toFixed(2);
  document.getElementById('s-balance').textContent = '¥' + (inc - exp).toFixed(2);
}

// ═══════════════════════════════════════
// CSV
// ═══════════════════════════════════════
function downloadCSV() {
  const data = loadAll();
  if (!data.length) return alert('暂无数据');
  const headers = ['日期','方向','类型','付款人/付款对象','金额（元）','备注'];
  const rows = data.map(r =>
    [r.date, r.dir==='income'?'收入':'支出', r.type, r.person, r.amount.toFixed(2), r.remark].map(cv));
  const inc = data.filter(r=>r.dir==='income').reduce((s,r)=>s+r.amount,0);
  const exp = data.filter(r=>r.dir==='expense').reduce((s,r)=>s+r.amount,0);
  rows.push(['合计','','','', inc.toFixed(2)+'（收入）','']);
  rows.push(['','','','', exp.toFixed(2)+'（支出）','']);
  rows.push(['','','','', (inc-exp).toFixed(2)+'（余额）','']);
  const csv = '﻿' + [headers,...rows].map(r=>r.join(',')).join('\n');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})),
    download: `戈21A+_资金记录_${new Date().toISOString().slice(0,10)}.csv`
  });
  a.click();
}
function cv(v) { const s=String(v??''); return /[,"\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:''+s; }
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══════════════════════════════════════
// APP INIT
// ═══════════════════════════════════════
function appInit() {
  updateTypeFilter();
  renderList();
  updateSummary();
}

// close modals on overlay click
['entry-modal','edit-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) this.classList.add('hidden');
  });
});

initPwd().then(() => {
  if (sessionStorage.getItem(SES_KEY) === '1') {
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    appInit();
  }
});
</script>
